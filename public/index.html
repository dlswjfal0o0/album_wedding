<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wedding Album</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root {
    --paper: #FFFFFF;
    --paper-dark: #F4F1EC;
    --card: #FFFFFF;
    --ink: #2B2926;
    --muted: #9C9388;
    --navy: #29251F;
    --navy-light: #46403A;
    --rose: #B89B6B;
    --sage: #6B645A;
    --danger: #B5524A;
    --shadow: rgba(40, 36, 30, 0.10);
    --radius: 4px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
  }

  input {
    font-family: inherit;
  }

  /* ---------- 로그인 화면 ---------- */

  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 12px 32px var(--shadow);
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .login-card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink);
    margin: 0 0 6px;
  }

  .login-card p.sub {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 28px;
  }

  .field {
    margin-bottom: 14px;
    text-align: left;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid #E3DDCD;
    border-radius: 8px;
    font-size: 15px;
    background: #FBF9F4;
    color: var(--ink);
  }

  .field input:focus {
    outline: 2px solid var(--navy);
    outline-offset: 1px;
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    background: var(--navy);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    margin-top: 6px;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: var(--navy-light); }
  .btn-primary:disabled { opacity: 0.6; cursor: default; }

  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ---------- 앱 화면 ---------- */

  #app-screen { display: none; }

  header.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--card);
    border-bottom: 1px solid #EDEAE3;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  header.app-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--ink);
    margin: 0;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-right .me {
    font-size: 13px;
    color: var(--muted);
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
  }

  .btn-ghost:hover { background: var(--paper); color: var(--ink); }

  /* 필터 바 - 앨범 인덱스 탭 느낌 */

  .filter-bar {
    padding: 16px 24px 0;
    max-width: 1100px;
    margin: 0 auto;
  }

  .tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    background: var(--paper-dark);
    color: var(--muted);
    padding: 9px 20px 8px;
    border-radius: 8px 8px 0 0;
    font-size: 14px;
    font-weight: 600;
    position: relative;
    top: 2px;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--card);
    color: var(--navy);
    box-shadow: 0 -2px 6px var(--shadow);
    top: 0;
  }

  .uploader-row {
    display: flex;
    gap: 8px;
    padding: 14px 0;
    overflow-x: auto;
    background: var(--card);
    margin: 0;
    padding-left: 16px;
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: 0 2px 6px var(--shadow);
  }

  .chip {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 999px;
    background: var(--paper);
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .chip.active {
    background: var(--navy);
    color: #fff;
  }

  /* ---------- 갤러리 ---------- */

  .gallery-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 100px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 4px;
  }

  .card {
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    cursor: pointer;
    background: var(--paper-dark);
  }

  .card .thumb-box {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: var(--paper-dark);
    position: relative;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.35s ease;
  }

  .card:hover img { transform: scale(1.04); }

  .video-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #3c3832, #232220);
    color: var(--rose);
  }

  .video-placeholder svg { width: 30px; height: 30px; opacity: 0.9; }

  .badge {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 999px;
    color: #fff;
    background: rgba(35, 33, 30, 0.55);
    backdrop-filter: blur(2px);
  }

  /* ---------- 업로드 버튼 / 모달 ---------- */

  .fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    font-size: 28px;
    box-shadow: 0 8px 20px rgba(45,49,66,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    transition: transform 0.15s;
  }

  .fab:hover { transform: scale(1.08); background: var(--navy-light); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 18, 14, 0.65);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card);
    border-radius: var(--radius);
    width: 100%;
    max-width: 480px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 24px;
  }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    color: var(--ink);
    margin: 0 0 16px;
    font-size: 24px;
  }

  .dropzone {
    border: 1.5px dashed #D8D2C6;
    border-radius: 6px;
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    transition: all 0.15s;
  }

  .dropzone.drag-over {
    border-color: var(--navy);
    background: var(--paper);
  }

  .dropzone strong { color: var(--navy); }

  .file-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }

  .file-item {
    background: var(--paper);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .file-item .name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-item .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .progress-track {
    margin-top: 6px;
    height: 6px;
    background: #DFD8C9;
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--sage);
    width: 0%;
    transition: width 0.2s;
  }

  .file-item.error .progress-fill { background: var(--danger); }
  .file-item .status-text { font-size: 11px; margin-top: 4px; color: var(--muted); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-secondary {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    font-weight: 600;
  }

  .btn-secondary:hover { background: var(--paper-dark); }

  /* ---------- 라이트박스 ---------- */

  #lightbox-overlay {
    background: rgba(10, 9, 7, 0.92);
  }

  .lightbox {
    background: transparent;
    max-width: 92vw;
    width: auto;
    max-height: 92vh;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lightbox-media-wrap {
    max-width: 92vw;
    max-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox img, .lightbox video {
    max-width: 92vw;
    max-height: 72vh;
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  .lightbox-info {
    color: #F4EFE4;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
  }

  .lightbox-info .uploader {
    font-family: 'Noto Serif KR', serif;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.02em;
  }

  .lightbox-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .lightbox-actions button, .lightbox-actions a {
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    background: rgba(255,255,255,0.12);
    color: #fff;
    text-decoration: none;
    display: inline-block;
  }

  .lightbox-actions button:hover, .lightbox-actions a:hover { background: rgba(255,255,255,0.22); }
  .lightbox-actions .delete-btn { background: rgba(181,82,74,0.5); }
  .lightbox-actions .delete-btn:hover { background: rgba(181,82,74,0.75); }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 60;
  }

  .lightbox-nav:hover { background: rgba(255,255,255,0.22); }
  .lightbox-nav.prev { left: 16px; }
  .lightbox-nav.next { right: 16px; }
  .lightbox-close {
    position: fixed;
    top: 18px;
    right: 22px;
    color: #fff;
    font-size: 28px;
    background: transparent;
    z-index: 60;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 560px) {
    header.app-header { padding: 14px 16px; }
    .filter-bar { padding: 12px 16px 0; }
    .uploader-row { padding-left: 12px; }
    .gallery-wrap { padding: 18px 14px 100px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .fab { bottom: 18px; right: 18px; width: 52px; height: 52px; }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <h1>Wedding Album</h1>
    <p class="sub">가족이 미리 만들어준 계정으로 로그인하세요</p>
    <form id="login-form">
      <div class="field">
        <label for="login-username">아이디</label>
        <input type="text" id="login-username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="login-password">비밀번호</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">로그인</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen">
  <header class="app-header">
    <h1>Wedding Album</h1>
    <div class="header-right">
      <span class="me" id="me-name"></span>
      <button class="btn-ghost" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <div class="filter-bar">
    <div class="tabs">
      <button class="tab active" data-type="all">전체</button>
      <button class="tab" data-type="photo">사진</button>
      <button class="tab" data-type="video">동영상</button>
    </div>
    <div class="uploader-row" id="uploader-row">
      <button class="chip active" data-uploader="all">전체보기</button>
    </div>
  </div>

  <div class="gallery-wrap">
    <div id="empty-state" class="empty-state" style="display:none;">
      <div class="big">아직 올린 사진이나 동영상이 없어요</div>
      <div>오른쪽 아래 + 버튼을 눌러 첫 추억을 올려보세요</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <button class="fab" id="upload-fab" title="사진/동영상 올리기">+</button>
</div>

<!-- 업로드 모달 -->
<div class="modal-overlay" id="upload-overlay">
  <div class="modal">
    <h2>사진 / 동영상 올리기</h2>
    <div class="dropzone" id="dropzone">
      <div><strong>여기에 파일을 끌어다 놓거나</strong></div>
      <div>클릭해서 사진/동영상을 선택하세요</div>
      <input type="file" id="file-input" accept="image/*,video/*" multiple style="display:none;">
    </div>
    <div class="file-list" id="upload-file-list"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="upload-close-btn">닫기</button>
    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div class="modal-overlay" id="lightbox-overlay">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <button class="lightbox-nav prev" id="lightbox-prev">&#8249;</button>
  <button class="lightbox-nav next" id="lightbox-next">&#8250;</button>
  <div class="lightbox">
    <div class="lightbox-media-wrap" id="lightbox-media"></div>
    <div class="lightbox-info">
      <div class="uploader" id="lightbox-uploader"></div>
      <div id="lightbox-meta"></div>
    </div>
    <div class="lightbox-actions">
      <a id="lightbox-download" href="#">다운로드</a>
      <button class="delete-btn" id="lightbox-delete" style="display:none;">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  const CHUNK_SIZE = 15 * 1024 * 1024; // 15MB
  const CONCURRENCY = 3;

  let token = localStorage.getItem('family_album_token') || null;
  let myName = localStorage.getItem('family_album_name') || '';
  let myId = localStorage.getItem('family_album_id') || '';

  let currentType = 'all';
  let currentUploader = 'all';
  let currentFiles = [];
  let lightboxIndex = -1;

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  function showToast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function authHeaders(extra) {
    return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
  }

  function fileUrl(file, mode) {
    return `/api/file/${file.id}?mode=${mode}&token=${encodeURIComponent(token)}`;
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    const units = ['KB', 'MB', 'GB', 'TB'];
    let i = -1;
    do { bytes /= 1024; i++; } while (bytes >= 1024 && i < units.length - 1);
    return bytes.toFixed(1) + ' ' + units[i];
  }

  function formatDate(iso) {
    const d = new Date(iso.replace(' ', 'T') + 'Z');
    return d.toLocaleString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  // ---------------- 로그인 ----------------

  function showApp() {
    $('#login-screen').style.display = 'none';
    $('#app-screen').style.display = 'block';
    $('#me-name').textContent = myName + '님';
    loadUsers();
    loadFiles();
  }

  if (token) showApp();

  $('#login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = $('#login-username').value.trim();
    const password = $('#login-password').value;
    const btn = $('#login-btn');
    const errEl = $('#login-error');
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = '로그인 중...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || '로그인에 실패했습니다.';
        return;
      }
      token = data.token;
      myName = data.displayName;
      myId = String(data.userId);
      localStorage.setItem('family_album_token', token);
      localStorage.setItem('family_album_name', myName);
      localStorage.setItem('family_album_id', myId);
      showApp();
    } catch (err) {
      errEl.textContent = '서버에 연결할 수 없습니다.';
    } finally {
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  });

  $('#logout-btn').addEventListener('click', () => {
    localStorage.removeItem('family_album_token');
    localStorage.removeItem('family_album_name');
    localStorage.removeItem('family_album_id');
    location.reload();
  });

  // ---------------- 필터 ----------------

  async function loadUsers() {
    try {
      const res = await fetch('/api/users', { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) return;
      const row = $('#uploader-row');
      row.innerHTML = '<button class="chip active" data-uploader="all">전체보기</button>';
      data.users.forEach((u) => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.dataset.uploader = u.id;
        chip.textContent = u.display_name;
        row.appendChild(chip);
      });
      row.addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        $$('.chip').forEach((c) => c.classList.remove('active'));
        chip.classList.add('active');
        currentUploader = chip.dataset.uploader;
        loadFiles();
      });
    } catch {}
  }

  $$('.tab').forEach((tab) => {
    tab.addEventListener('click', () => {
      $$('.tab').forEach((t) => t.classList.remove('active'));
      tab.classList.add('active');
      currentType = tab.dataset.type;
      loadFiles();
    });
  });

  // ---------------- 갤러리 ----------------

  async function loadFiles() {
    try {
      const params = new URLSearchParams({ type: currentType, uploader: currentUploader });
      const res = await fetch('/api/files?' + params.toString(), { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { localStorage.clear(); location.reload(); }
        return;
      }
      currentFiles = data.files;
      renderGrid();
    } catch {
      showToast('목록을 불러오지 못했습니다.');
    }
  }

  function renderGrid() {
    const grid = $('#grid');
    const empty = $('#empty-state');
    grid.innerHTML = '';

    if (currentFiles.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    currentFiles.forEach((file, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.addEventListener('click', () => openLightbox(idx));

      const thumbBox = document.createElement('div');
      thumbBox.className = 'thumb-box';

      if (file.file_type === 'photo') {
        const img = document.createElement('img');
        img.src = fileUrl(file, 'view');
        img.loading = 'lazy';
        img.alt = file.original_filename;
        thumbBox.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'video-placeholder';
        ph.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        thumbBox.appendChild(ph);
      }

      card.appendChild(thumbBox);
      grid.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------------- 라이트박스 ----------------

  function openLightbox(idx) {
    lightboxIndex = idx;
    renderLightbox();
    $('#lightbox-overlay').classList.add('show');
  }

  function closeLightbox() {
    $('#lightbox-overlay').classList.remove('show');
    $('#lightbox-media').innerHTML = '';
  }

  function renderLightbox() {
    const file = currentFiles[lightboxIndex];
    if (!file) return;

    const mediaWrap = $('#lightbox-media');
    mediaWrap.innerHTML = '';

    if (file.file_type === 'photo') {
      const img = document.createElement('img');
      img.src = fileUrl(file, 'view');
      mediaWrap.appendChild(img);
    } else {
      const video = document.createElement('video');
      video.src = fileUrl(file, 'view');
      video.controls = true;
      video.autoplay = true;
      video.preload = 'metadata';
      mediaWrap.appendChild(video);
    }

    $('#lightbox-uploader').textContent = file.uploader_name;
    $('#lightbox-meta').textContent = `${formatDate(file.created_at)} · ${formatBytes(file.size_bytes)}`;
    $('#lightbox-download').href = fileUrl(file, 'download');
    $('#lightbox-download').setAttribute('download', file.original_filename);

    const delBtn = $('#lightbox-delete');
    if (String(file.uploader_id) === String(myId)) {
      delBtn.style.display = 'inline-block';
      delBtn.onclick = () => deleteFile(file);
    } else {
      delBtn.style.display = 'none';
    }
  }

  async function deleteFile(file) {
    if (!confirm('이 파일을 삭제할까요? 삭제하면 되돌릴 수 없어요.')) return;
    try {
      const res = await fetch(`/api/file/${file.id}`, { method: 'DELETE', headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || '삭제에 실패했습니다.'); return; }
      showToast('삭제했습니다.');
      closeLightbox();
      loadFiles();
    } catch {
      showToast('삭제 중 오류가 발생했습니다.');
    }
  }

  $('#lightbox-close').addEventListener('click', closeLightbox);
  $('#lightbox-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox-overlay') closeLightbox();
  });
  $('#lightbox-prev').addEventListener('click', () => {
    if (lightboxIndex > 0) { lightboxIndex--; renderLightbox(); }
  });
  $('#lightbox-next').addEventListener('click', () => {
    if (lightboxIndex < currentFiles.length - 1) { lightboxIndex++; renderLightbox(); }
  });
  document.addEventListener('keydown', (e) => {
    if (!$('#lightbox-overlay').classList.contains('show')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') $('#lightbox-prev').click();
    if (e.key === 'ArrowRight') $('#lightbox-next').click();
  });

  // ---------------- 업로드 ----------------

  $('#upload-fab').addEventListener('click', () => {
    $('#upload-overlay').classList.add('show');
  });
  $('#upload-close-btn').addEventListener('click', () => {
    $('#upload-overlay').classList.remove('show');
    loadFiles();
  });

  const dropzone = $('#dropzone');
  const fileInput = $('#file-input');

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    handleFiles(fileInput.files);
    fileInput.value = '';
  });

  function handleFiles(fileList) {
    Array.from(fileList).forEach((file) => queueUpload(file));
  }

  function queueUpload(file) {
    const isPhoto = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');
    if (!isPhoto && !isVideo) {
      showToast(`${file.name}: 사진 또는 동영상만 업로드할 수 있어요.`);
      return;
    }

    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <div class="name">${escapeHtml(file.name)}</div>
      <div class="meta">${formatBytes(file.size)}</div>
      <div class="progress-track"><div class="progress-fill"></div></div>
      <div class="status-text">대기 중...</div>
    `;
    $('#upload-file-list').prepend(item);

    const fill = item.querySelector('.progress-fill');
    const statusText = item.querySelector('.status-text');

    uploadFile(file, (pct) => {
      fill.style.width = pct + '%';
      statusText.textContent = pct < 100 ? `업로드 중... ${pct}%` : '마무리 중...';
    }).then(() => {
      fill.style.width = '100%';
      statusText.textContent = '완료';
      loadFiles();
    }).catch((err) => {
      item.classList.add('error');
      statusText.textContent = '실패: ' + err.message;
    });
  }

  async function uploadFile(file, onProgress) {
    const startRes = await fetch('/api/upload/start', {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ filename: file.name, mimeType: file.type, size: file.size })
    });
    const startData = await startRes.json();
    if (!startRes.ok) throw new Error(startData.error || '업로드 시작 실패');

    const { fileId, key, uploadId } = startData;

    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
    const chunks = [];
    for (let i = 0; i < totalChunks; i++) {
      chunks.push({ index: i, start: i * CHUNK_SIZE, end: Math.min((i + 1) * CHUNK_SIZE, file.size) });
    }

    let uploadedBytes = 0;
    const results = new Array(chunks.length);

    try {
      let nextIndex = 0;
      async function worker() {
        while (nextIndex < chunks.length) {
          const i = nextIndex++;
          const chunk = chunks[i];
          const blob = file.slice(chunk.start, chunk.end);
          const partNumber = i + 1;

          const partRes = await fetch(
            `/api/upload/part?key=${encodeURIComponent(key)}&uploadId=${encodeURIComponent(uploadId)}&partNumber=${partNumber}`,
            { method: 'POST', headers: authHeaders(), body: blob }
          );
          const partData = await partRes.json();
          if (!partRes.ok) throw new Error(partData.error || '파트 업로드 실패');

          results[i] = { partNumber: partData.partNumber, etag: partData.etag };
          uploadedBytes += (chunk.end - chunk.start);
          onProgress(Math.min(99, Math.round((uploadedBytes / file.size) * 100)));
        }
      }

      const workers = Array.from({ length: Math.min(CONCURRENCY, chunks.length) }, () => worker());
      await Promise.all(workers);

      const completeRes = await fetch('/api/upload/complete', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ fileId, key, uploadId, parts: results })
      });
      const completeData = await completeRes.json();
      if (!completeRes.ok) throw new Error(completeData.error || '업로드 완료 처리 실패');
    } catch (err) {
      fetch('/api/upload/abort', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ fileId, key, uploadId })
      }).catch(() => {});
      throw err;
    }
  }
})();
</script>
</body>
